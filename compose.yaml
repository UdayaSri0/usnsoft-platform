services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: usnsoft_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - usnsoft

  web:
    image: nginx:alpine
    container_name: usnsoft_web
    ports:
      - "${USNSOFT_HTTP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - usnsoft

  postgres:
    image: postgres:17-alpine
    container_name: usnsoft_postgres
    environment:
      POSTGRES_DB: usnsoft
      POSTGRES_USER: usnsoft
      POSTGRES_PASSWORD: usnsoft_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usnsoft -d usnsoft"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - usnsoft

  redis:
    image: redis:7-alpine
    container_name: usnsoft_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - usnsoft

  node:
    image: node:22-alpine
    container_name: usnsoft_node
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    networks:
      - usnsoft

  mailpit:
    image: axllent/mailpit:latest
    container_name: usnsoft_mailpit
    ports:
      - "8025:8025"
    networks:
      - usnsoft

networks:
  usnsoft:

volumes:
  postgres_data:
  redis_data:
